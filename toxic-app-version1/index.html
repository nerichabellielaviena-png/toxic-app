    color: {

    marks: [

define({id: "99a64dd4", inputs: ["html","colorMap","L","data","display","zoomMapa"], outputs: ["renderMapWithLegend"], body: (html,colorMap,L,data,display,zoomMapa) => {
function renderMapWithLegend(z) {
  // Contenedor principal
  const container = html`<div style="display: flex; gap: 15px; font-family: sans-serif; align-items: flex-start;"></div>`;
  
  // Div para el mapa
  const mapDiv = html`<div style="flex-grow: 1; height: 550px; border-radius: 8px; border: 1px solid #ccc;"></div>`;
  
  // Div para la leyenda (Scroll si hay muchos elementos)
  const legendDiv = html`
    <div style="min-width: 220px; max-height: 550px; overflow-y: auto; padding: 10px; background: #f9f9f9; border-radius: 8px; font-size: 12px; border: 1px solid #ddd;">
      <h4 style="margin: 0 0 10px 0;">Sectores Industriales</h4>
      ${Object.entries(colorMap).map(([sector, color]) => html`
        <div style="display: flex; align-items: center; margin-bottom: 4px;">
          <div style="width: 12px; height: 12px; background-color: ${color}; border-radius: 50%; margin-right: 8px; border: 1px solid #555;"></div>
          <span>${sector}</span>
        </div>
      `)}
    </div>
  `;

  container.append(mapDiv, legendDiv);

  // Lógica de Leaflet
  Promise.resolve().then(() => {
    const map = L.map(mapDiv).setView([18.2208, -66.5901], z);

    const token = 'pk.eyJ1IjoibWVjb2JpIiwiYSI6IjU4YzVlOGQ2YjEzYjE3NTcxOTExZTI2OWY3Y2Y1ZGYxIn0.LUg7xQhGH2uf3zA57szCyw';
    const linkMapa = 'https://api.mapbox.com/styles/v1/mapbox/satellite-streets-v12/tiles/512/{z}/{x}/{y}@2x?access_token=';
    
    L.tileLayer(linkMapa + token, {
      attribution: '© Mapbox © OpenStreetMap',
      tileSize: 512,
      zoomOffset: -1
    }).addTo(map);


    if (!data || !data._data) {
      mapDiv.appendChild(html`<p style="color: red;">Error: No hay datos disponibles</p>`);
      return mapDiv;
    }

    const latitudes = data._data.LATITUDE || [];
    const longitudes = data._data.LONGITUDE || [];
    const years = data._data.YEAR || [];
    const facilities = data._data.FACILITY || [];
    const cities = data._data.CITY || [];
    const industries = data._data.INDUSTRY || [];
    const chemicals = data._data.CHEMICAL || [];

    const coords = latitudes.map((lat, i) => [lat, longitudes[i]]).filter(coord => 
      coord[0] && coord[1] && !isNaN(coord[0]) && !isNaN(coord[1])
    );

    coords.forEach((coord, i) => {
      const idx = latitudes.indexOf(coord[0]);
      if (idx === -1) return;
      
      const industry = industries[idx] || "Other";
      const color = colorMap[industry] || "turquoise";

      const marker = L.circleMarker(coord, {
        color: color,
        radius: 8,
        opacity: 1,
        fillOpacity: 0.8,
        weight: 2
      }).addTo(map);

    marker.bindPopup(`
  <div style="font-family: Arial; min-width: 250px;">
    <strong>Año:</strong> ${years[i]}<br/>
    <strong>Municipio:</strong> ${cities[i]}<br/>
    <strong>Nombre de la Facilidad:</strong> ${facilities[i]}<br/>
    <strong>Sector Industrial:</strong> ${industry}<br/>
    <strong>Químico:</strong> ${chemicals[i]}
  </div>
`);
    });

  });

return container;
}

display(renderMapWithLegend(zoomMapa));
